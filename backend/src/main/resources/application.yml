server:
  port: 9091
  servlet:
    context-path: /

spring:
  application:
    name: mayi-book
  # 激活的环境配置，默认使用 dev（本地环境）
  # 可通过启动参数 -Dspring.profiles.active=test 或环境变量 SPRING_PROFILES_ACTIVE=test 来切换
  profiles:
    active: test

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mayi.book.entity

# 微信小程序配置
wechat:
  appid: wx159e46d91d603ac7
  secret: 86d821c9fb156ddc0d0da828a82a7168

# JWT配置
jwt:
  secret: mayi-book-secret-key-2024-very-long-secure-key-for-jwt-hmac-sha512-algorithm
  expiration: 604800000  # 7天，单位：毫秒
